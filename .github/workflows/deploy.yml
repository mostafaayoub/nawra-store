name: Deploy to VPS

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}   # allow manual trigger from Actions UI

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Hostinger VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 10m
          script: |
            set -euo pipefail
            # The repo lives at /var/www/nawra-store on the VPS — NOT
            # /var/www/nawra (legacy path from the original spec). PM2 runs
            # api/server.js IN-PLACE from this checkout, so the old /var/www/
            # nawra-api copy step has been removed.
            cd /var/www/nawra-store

            echo "==> [1/5] Pull latest code"
            git fetch origin main
            git reset --hard origin/main
            COMMIT=$(git rev-parse --short HEAD)
            echo "    Now at commit: $COMMIT"

            echo "==> [2/5] Install dependencies (npm ci if lockfile, npm install otherwise)"
            if [ -f package-lock.json ]; then
              npm ci --prefer-offline --no-audit --no-fund
            else
              npm install --prefer-offline --no-audit --no-fund
            fi

            echo "==> [3/5] Build production bundle"
            rm -rf dist
            npm run build
            ls -lh dist/assets/

            echo "==> [4/5] Install api deps + restart PM2 (server.js runs in-place)"
            if [ -d api ]; then
              cd api
              npm install --prefer-offline --no-audit --no-fund
              cd ..
              pm2 restart nawra-api
              echo "    API restarted (.env + orders.db preserved)"
            else
              echo "    skipped: no api/ directory in repo"
            fi

            echo "==> [5/5] Reload Nginx + verify bundle hash"
            nginx -t
            systemctl reload nginx
            DEPLOYED_HASH=$(grep -oE 'index-[A-Za-z0-9_-]+\.js' dist/index.html | head -1)
            LIVE_HASH=$(curl -sk https://nawra.ayoupstudio.tech/ | grep -oE 'index-[A-Za-z0-9_-]+\.js' | head -1)
            echo "    dist/index.html references: $DEPLOYED_HASH"
            echo "    live site serves:           $LIVE_HASH"
            if [ "$DEPLOYED_HASH" != "$LIVE_HASH" ]; then
              echo "    ✗ MISMATCH — nginx may still be caching" >&2
              exit 1
            fi
            echo "    ✓ Deployed $COMMIT to https://nawra.ayoupstudio.tech at $(date -u)"
