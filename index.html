<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>نوّرَة | NAWRA Skincare</title>
    <meta name="description" content="نوّرَة للعناية بالبشرة — منتجات أصلية من أفضل البراندات العالمية" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Arabic serif headings -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <!-- Arabic sans-serif body / UI -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <!-- English elegant accents, prices, eyebrows -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&display=swap" rel="stylesheet" />
    <style>
      :root {
        --cream:  #FBF7F4;
        --cream2: #F3EAE2;
        --cream3: #EDE0D4;
        --gold:   #C4956A;
        --gold-faint: rgba(196,149,106,.10);
        --gold-mid:   rgba(196,149,106,.40);
        --dark:   #2A1F0E;
        --dark2:  #1E1508;
        --warm:   #7A5C42;
        --muted:  #9C7D65;
        --white:  #FFFFFF;
        --fa: 'Noto Serif Arabic', serif;
        --fb: 'Cairo', sans-serif;
        --fe: 'Cormorant Garamond', serif;
      }
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html { scroll-behavior: smooth; }
      body {
        font-family: var(--fb);
        background: var(--cream);
        color: var(--dark);
        direction: rtl;
        overflow-x: hidden;
      }
      ::-webkit-scrollbar { width: 5px; }
      ::-webkit-scrollbar-track { background: var(--cream); }
      ::-webkit-scrollbar-thumb { background: var(--gold-mid); border-radius: 3px; }
      button { font-family: var(--fb); }
      input, textarea, select { font-family: var(--fb); }

      /* Ensure Arabic glyphs always use Noto Serif Arabic or Cairo */
      :lang(ar) h1, :lang(ar) h2, :lang(ar) h3 { font-family: var(--fa); }
      :lang(ar) p, :lang(ar) span, :lang(ar) a, :lang(ar) li, :lang(ar) label { font-family: var(--fb); }

      /* Cormorant for English display text */
      .font-fe { font-family: var(--fe); }
      .font-fa { font-family: var(--fa); }
      .font-fb { font-family: var(--fb); }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
